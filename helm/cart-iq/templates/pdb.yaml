{{- range $name, $cfg := .Values.podDisruptionBudget }}
{{- if $cfg.enabled }}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "cart-iq.fullname" $ }}-{{ kebabcase $name }}
  labels:
    {{- include "cart-iq.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ kebabcase $name }}
spec:
  minAvailable: {{ $cfg.minAvailable }}
  selector:
    matchLabels:
      {{- include "cart-iq.selectorLabels" $ | nindent 6 }}
      {{- if eq $name "celeryDefault" }}
      app.kubernetes.io/component: celery-default
      {{- else if eq $name "scraper" }}
      app.kubernetes.io/component: celery-scraper
      {{- else }}
      app.kubernetes.io/component: {{ $name }}
      {{- end }}
{{- end }}
{{- end }}
