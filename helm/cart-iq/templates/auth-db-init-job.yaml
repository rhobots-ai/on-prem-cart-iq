{{- if .Values.authDbInit.enabled -}}
# Ensures the `auth` database exists. Better-Auth handles its own schema migrations on boot.
# Idempotent — uses CREATE DATABASE IF NOT EXISTS via psql.
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "insur-iq.fullname" . }}-auth-db-init
  labels:
    {{- include "insur-iq.labels" . | nindent 4 }}
    app.kubernetes.io/component: auth-db-init
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "5"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  backoffLimit: 2
  activeDeadlineSeconds: 120
  template:
    metadata:
      labels:
        {{- include "insur-iq.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: auth-db-init
    spec:
      restartPolicy: Never
      serviceAccountName: {{ include "insur-iq.sa.celery" . }}
      securityContext:
        {{- include "insur-iq.podSecurityContext" . | nindent 8 }}
      initContainers:
        {{- include "insur-iq.waitForSecret" . | nindent 8 }}
      containers:
        - name: psql
          image: "{{ .Values.authDbInit.image.repository }}:{{ .Values.authDbInit.image.tag }}"
          command:
            - /bin/sh
            - -c
            - |
              set -e
              # Idempotent: create only if missing.
              EXISTS=$(PGPASSWORD="$DB_PASSWORD" psql -h "$DB_HOST" -p "$DB_PORT" -U "$DB_USER" -d postgres -tAc "SELECT 1 FROM pg_database WHERE datname='$DB_NAME_AUTH'")
              if [ "$EXISTS" != "1" ]; then
                PGPASSWORD="$DB_PASSWORD" psql -h "$DB_HOST" -p "$DB_PORT" -U "$DB_USER" -d postgres -c "CREATE DATABASE \"$DB_NAME_AUTH\""
                echo "Created database $DB_NAME_AUTH"
              else
                echo "Database $DB_NAME_AUTH already exists"
              fi
          envFrom:
            - secretRef:
                name: {{ include "insur-iq.secretName.db" . }}
          resources: {{ toYaml .Values.authDbInit.resources | nindent 12 }}
          securityContext:
            {{- include "insur-iq.containerSecurityContext" . | nindent 12 }}
{{- end }}
