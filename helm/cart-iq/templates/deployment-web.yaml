apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cart-iq.fullname" . }}-web
  labels:
    {{- include "cart-iq.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  {{- if not .Values.autoscaling.web.enabled }}
  replicas: {{ .Values.web.replicas }}
  {{- end }}
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      {{- include "cart-iq.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: web
  template:
    metadata:
      labels:
        {{- include "cart-iq.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: web
      annotations:
        {{- toYaml .Values.web.podAnnotations | nindent 8 }}
    spec:
      securityContext:
        {{- include "cart-iq.podSecurityContext" . | nindent 8 }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets: {{ toYaml . | nindent 8 }}
      {{- end }}
      topologySpreadConstraints:
        {{- include "cart-iq.topologySpread" . | nindent 8 }}
      containers:
        - name: web
          image: {{ include "cart-iq.image.web" . }}
          imagePullPolicy: {{ .Values.image.web.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.web.containerPort }}
              protocol: TCP
          env:
            {{- include "cart-iq.webEnv" . | nindent 12 }}
            {{- with .Values.web.extraEnv }}{{ toYaml . | nindent 12 }}{{- end }}
          livenessProbe: {{ toYaml .Values.web.livenessProbe | nindent 12 }}
          readinessProbe: {{ toYaml .Values.web.readinessProbe | nindent 12 }}
          resources: {{ toYaml .Values.web.resources | nindent 12 }}
          securityContext:
            {{- include "cart-iq.containerSecurityContext" . | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 256Mi
