{{- if .Values.celery.beat.enabled -}}
# Celery Beat — singleton. Recreate strategy ensures old pod terminates before
# new pod starts (DatabaseScheduler relies on no concurrent scheduler instances).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cart-iq.fullname" . }}-celery-beat
  labels:
    {{- include "cart-iq.labels" . | nindent 4 }}
    app.kubernetes.io/component: celery-beat
spec:
  replicas: 1
  revisionHistoryLimit: 2
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "cart-iq.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: celery-beat
  template:
    metadata:
      labels:
        {{- include "cart-iq.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: celery-beat
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.celery.podAnnotations }}{{ toYaml . | nindent 8 }}{{- end }}
    spec:
      serviceAccountName: {{ include "cart-iq.sa.celery" . }}
      securityContext:
        {{- include "cart-iq.podSecurityContext" . | nindent 8 }}
      containers:
        - name: beat
          image: {{ include "cart-iq.image.backend" . }}
          imagePullPolicy: {{ .Values.image.backend.pullPolicy }}
          command:
            - celery
            - -A
            - config
            - beat
            - --loglevel=INFO
            - --scheduler=django_celery_beat.schedulers:DatabaseScheduler
          envFrom:
            {{- include "cart-iq.backendEnvFrom" . | nindent 12 }}
          env:
            {{- include "cart-iq.backendDerivedEnv" . | nindent 12 }}
          resources: {{ toYaml .Values.celery.beat.resources | nindent 12 }}
          securityContext:
            {{- include "cart-iq.containerSecurityContext" . | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 64Mi
{{- end }}
