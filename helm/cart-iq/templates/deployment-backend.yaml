apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "insur-iq.fullname" . }}-backend
  labels:
    {{- include "insur-iq.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  {{- if not .Values.autoscaling.backend.enabled }}
  replicas: {{ .Values.backend.replicas }}
  {{- end }}
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      {{- include "insur-iq.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        {{- include "insur-iq.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: backend
      annotations:
        {{- with .Values.backend.podAnnotations }}{{ toYaml . | nindent 8 }}{{- end }}
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      serviceAccountName: {{ include "insur-iq.sa.backend" . }}
      securityContext:
        {{- include "insur-iq.podSecurityContext" . | nindent 8 }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets: {{ toYaml . | nindent 8 }}
      {{- end }}
      topologySpreadConstraints:
        {{- include "insur-iq.topologySpread" . | nindent 8 }}
      containers:
        - name: backend
          image: {{ include "insur-iq.image.backend" . }}
          imagePullPolicy: {{ .Values.image.backend.pullPolicy }}
          command: {{ toJson .Values.backend.command }}
          ports:
            - name: http
              containerPort: {{ .Values.backend.containerPort }}
              protocol: TCP
          envFrom:
            {{- include "insur-iq.backendEnvFrom" . | nindent 12 }}
          env:
            {{- include "insur-iq.backendDerivedEnv" . | nindent 12 }}
            {{- with .Values.backend.extraEnv }}{{ toYaml . | nindent 12 }}{{- end }}
          livenessProbe: {{ toYaml .Values.backend.livenessProbe | nindent 12 }}
          readinessProbe: {{ toYaml .Values.backend.readinessProbe | nindent 12 }}
          resources: {{ toYaml .Values.backend.resources | nindent 12 }}
          securityContext:
            {{- include "insur-iq.containerSecurityContext" . | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 1Gi
