apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cart-iq.fullname" . }}-backend
  labels:
    {{- include "cart-iq.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  {{- if not .Values.autoscaling.backend.enabled }}
  replicas: {{ .Values.backend.replicas }}
  {{- end }}
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      {{- include "cart-iq.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        {{- include "cart-iq.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: backend
      annotations:
        {{- with .Values.backend.podAnnotations }}{{ toYaml . | nindent 8 }}{{- end }}
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      serviceAccountName: {{ include "cart-iq.sa.backend" . }}
      securityContext:
        {{- include "cart-iq.podSecurityContext" . | nindent 8 }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets: {{ toYaml . | nindent 8 }}
      {{- end }}
      topologySpreadConstraints:
        {{- include "cart-iq.topologySpread" . | nindent 8 }}
      containers:
        - name: backend
          image: {{ include "cart-iq.image.backend" . }}
          imagePullPolicy: {{ .Values.image.backend.pullPolicy }}
          command: {{ toJson .Values.backend.command }}
          ports:
            - name: http
              containerPort: {{ .Values.backend.containerPort }}
              protocol: TCP
          envFrom:
            {{- include "cart-iq.backendEnvFrom" . | nindent 12 }}
          env:
            {{- include "cart-iq.backendDerivedEnv" . | nindent 12 }}
            {{- with .Values.backend.extraEnv }}{{ toYaml . | nindent 12 }}{{- end }}
          livenessProbe: {{ toYaml .Values.backend.livenessProbe | nindent 12 }}
          readinessProbe: {{ toYaml .Values.backend.readinessProbe | nindent 12 }}
          resources: {{ toYaml .Values.backend.resources | nindent 12 }}
          securityContext:
            {{- include "cart-iq.containerSecurityContext" . | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            {{- if .Values.vertexServiceAccount.enabled }}
            - name: vertex-sa
              mountPath: {{ .Values.vertexServiceAccount.mountPath }}
              readOnly: true
            {{- end }}
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 1Gi
        {{- if .Values.vertexServiceAccount.enabled }}
        - name: vertex-sa
          secret:
            secretName: {{ required "vertexServiceAccount.existingSecret is required when vertexServiceAccount.enabled=true" .Values.vertexServiceAccount.existingSecret }}
            items:
              - key: gcp-sa.json
                path: gcp-sa.json
        {{- end }}
