{{- if not .Values.externalSecrets.enabled -}}
# Inline secrets — fallback for local kind/dev clusters only.
# Production uses ExternalSecret (see external-secret.yaml).
{{- range $group, $kvs := .Values.secrets }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "cart-iq.fullname" $ }}-{{ $group }}
  labels:
    {{- include "cart-iq.labels" $ | nindent 4 }}
type: Opaque
stringData:
  {{- range $k, $v := $kvs }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
{{- end }}
{{- end }}
