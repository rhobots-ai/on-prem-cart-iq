apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "cart-iq.configMapName" . }}
  labels:
    {{- include "cart-iq.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "0"
    helm.sh/hook-delete-policy: before-hook-creation
data:
  DEBUG: {{ .Values.config.DEBUG | quote }}
  APP_ENV: {{ .Values.config.APP_ENV | quote }}
  AWS_REGION: {{ default .Values.global.awsRegion .Values.config.AWS_REGION | quote }}
  AWS_S3_REGION_NAME: {{ default .Values.global.awsRegion .Values.config.AWS_REGION | quote }}
  AWS_STORAGE_BUCKET_NAME: {{ required "config.AWS_STORAGE_BUCKET_NAME is required" .Values.config.AWS_STORAGE_BUCKET_NAME | quote }}
  AWS_S3_ENDPOINT_URL: {{ .Values.config.AWS_S3_ENDPOINT_URL | quote }}
  AWS_S3_PUBLIC_ENDPOINT_URL: {{ .Values.config.AWS_S3_PUBLIC_ENDPOINT_URL | quote }}
  CELERY_RESULT_BACKEND: {{ .Values.config.CELERY_RESULT_BACKEND | quote }}
  CELERY_CACHE_BACKEND: {{ .Values.config.CELERY_CACHE_BACKEND | quote }}
  # Embedding + parity-chat tuning (provider/model/keys live in the llm Secret).
  EMBED_MODEL: {{ .Values.config.EMBED_MODEL | quote }}
  EMBED_DIMENSIONS: {{ .Values.config.EMBED_DIMENSIONS | quote }}
  GEMINI_USE_VERTEX_AI: {{ .Values.config.GEMINI_USE_VERTEX_AI | quote }}
  EMBED_USE_VERTEX_AI: {{ .Values.config.EMBED_USE_VERTEX_AI | quote }}
  {{- with .Values.config.GOOGLE_CLOUD_PROJECT }}
  GOOGLE_CLOUD_PROJECT: {{ . | quote }}
  {{- end }}
  GOOGLE_CLOUD_LOCATION: {{ .Values.config.GOOGLE_CLOUD_LOCATION | quote }}
  {{- if .Values.vertexServiceAccount.enabled }}
  GOOGLE_APPLICATION_CREDENTIALS: {{ printf "%s/gcp-sa.json" .Values.vertexServiceAccount.mountPath | quote }}
  {{- end }}
  PARITY_CHAT_CACHE_ENABLED: {{ .Values.config.PARITY_CHAT_CACHE_ENABLED | quote }}
  ANTHROPIC_RATIONALES_ENABLED: {{ .Values.config.ANTHROPIC_RATIONALES_ENABLED | quote }}
  # Scraper tunables.
  SCRAPER_DEFAULT_PINCODE: {{ .Values.config.SCRAPER_DEFAULT_PINCODE | quote }}
  SCRAPER_MAX_CONCURRENCY: {{ .Values.config.SCRAPER_MAX_CONCURRENCY | quote }}
  SCRAPER_COLOR_CONCURRENCY: {{ .Values.config.SCRAPER_COLOR_CONCURRENCY | quote }}
  SCRAPER_BROWSER_TIMEOUT_MS: {{ .Values.config.SCRAPER_BROWSER_TIMEOUT_MS | quote }}
  SCRAPER_NAVIGATE_TIMEOUT_MS: {{ .Values.config.SCRAPER_NAVIGATE_TIMEOUT_MS | quote }}
  SCRAPER_DEBUG_ARTIFACTS_ENABLED: {{ .Values.config.SCRAPER_DEBUG_ARTIFACTS_ENABLED | quote }}
  SCRAPER_RETRY_MAX: {{ .Values.config.SCRAPER_RETRY_MAX | quote }}
  SCRAPER_FLIPKART_RATE_PER_MIN: {{ .Values.config.SCRAPER_FLIPKART_RATE_PER_MIN | quote }}
  SCRAPER_DEFAULT_RATE_PER_MIN: {{ .Values.config.SCRAPER_DEFAULT_RATE_PER_MIN | quote }}
  SCRAPER_RATE_LIMIT_ENABLED: {{ .Values.config.SCRAPER_RATE_LIMIT_ENABLED | quote }}
  SCRAPER_JITTER_MS_MIN: {{ .Values.config.SCRAPER_JITTER_MS_MIN | quote }}
  SCRAPER_JITTER_MS_MAX: {{ .Values.config.SCRAPER_JITTER_MS_MAX | quote }}
  SCRAPER_LISTING_MAX_PAGES: {{ .Values.config.SCRAPER_LISTING_MAX_PAGES | quote }}
  SCRAPER_LISTING_PARTITION: {{ .Values.config.SCRAPER_LISTING_PARTITION | quote }}
  SCRAPER_PRICE_SIZE_VARIANTS: {{ .Values.config.SCRAPER_PRICE_SIZE_VARIANTS | quote }}
  SCRAPER_FORCE_AKAMAI_EDGE: {{ .Values.config.SCRAPER_FORCE_AKAMAI_EDGE | quote }}
  SCRAPER_AKAMAI_HOSTS: {{ .Values.config.SCRAPER_AKAMAI_HOSTS | quote }}
  {{- with .Values.config.SCRAPER_AKAMAI_FALLBACK_IP }}
  SCRAPER_AKAMAI_FALLBACK_IP: {{ . | quote }}
  {{- end }}
  SCRAPER_AKAMAI_PROBE_TIMEOUT_S: {{ .Values.config.SCRAPER_AKAMAI_PROBE_TIMEOUT_S | quote }}
  SCRAPER_AKAMAI_CACHE_TTL_S: {{ .Values.config.SCRAPER_AKAMAI_CACHE_TTL_S | quote }}
