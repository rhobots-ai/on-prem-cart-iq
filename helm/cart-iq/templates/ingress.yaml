{{- if .Values.ingress.enabled -}}
# Single ALB, three path rules, single host.
# Path-based routing matches the existing app contract (CLAUDE.md).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "insur-iq.fullname" . }}
  labels:
    {{- include "insur-iq.labels" . | nindent 4 }}
  annotations:
    alb.ingress.kubernetes.io/scheme: {{ .Values.ingress.scheme }}
    alb.ingress.kubernetes.io/target-type: {{ .Values.ingress.targetType }}
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80},{"HTTPS":443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    alb.ingress.kubernetes.io/certificate-arn: {{ required "ingress.certificateArn is required when ingress.enabled=true" .Values.ingress.certificateArn }}
    alb.ingress.kubernetes.io/load-balancer-attributes: idle_timeout.timeout_seconds={{ .Values.ingress.idleTimeoutSeconds }},routing.http.drop_invalid_header_fields.enabled=true
    alb.ingress.kubernetes.io/healthcheck-path: /
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: "15"
    alb.ingress.kubernetes.io/group.name: {{ include "insur-iq.fullname" . }}
    {{- if .Values.ingress.adminCidrAllowlist }}
    # Admin path lockdown — listener rule restricting /service-api/admin/*.
    alb.ingress.kubernetes.io/conditions.admin: |
      [{"field":"source-ip","sourceIpConfig":{"values": {{ .Values.ingress.adminCidrAllowlist | toJson }} }}]
    alb.ingress.kubernetes.io/actions.deny-admin: |
      {"type":"fixed-response","fixedResponseConfig":{"statusCode":"403","contentType":"text/plain","messageBody":"Forbidden"}}
    {{- end }}
    {{- with .Values.ingress.extraAnnotations }}{{ toYaml . | nindent 4 }}{{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    - host: {{ default (include "insur-iq.domain" .) .Values.ingress.host }}
      http:
        paths:
          {{- if .Values.ingress.adminCidrAllowlist }}
          - path: /service-api/admin
            pathType: Prefix
            backend:
              service:
                name: {{ include "insur-iq.fullname" . }}-backend
                port:
                  number: {{ .Values.backend.containerPort }}
          {{- end }}
          - path: /service-api
            pathType: Prefix
            backend:
              service:
                name: {{ include "insur-iq.fullname" . }}-backend
                port:
                  number: {{ .Values.backend.containerPort }}
          - path: /auth
            pathType: Prefix
            backend:
              service:
                name: {{ include "insur-iq.fullname" . }}-auth
                port:
                  number: {{ .Values.auth.containerPort }}
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "insur-iq.fullname" . }}-web
                port:
                  number: {{ .Values.web.containerPort }}
{{- end }}
