{{- if .Values.migrate.enabled -}}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "cart-iq.fullname" . }}-migrate
  labels:
    {{- include "cart-iq.labels" . | nindent 4 }}
    app.kubernetes.io/component: migrate
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "10"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  backoffLimit: {{ .Values.migrate.backoffLimit }}
  activeDeadlineSeconds: {{ .Values.migrate.activeDeadlineSeconds }}
  template:
    metadata:
      labels:
        {{- include "cart-iq.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: migrate
    spec:
      restartPolicy: Never
      serviceAccountName: {{ include "cart-iq.sa.celery" . }}
      securityContext:
        {{- include "cart-iq.podSecurityContext" . | nindent 8 }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets: {{ toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        {{- include "cart-iq.waitForSecret" . | nindent 8 }}
      containers:
        - name: migrate
          image: {{ include "cart-iq.image.backend" . }}
          imagePullPolicy: {{ .Values.image.backend.pullPolicy }}
          command: {{ toJson .Values.migrate.command }}
          envFrom:
            {{- include "cart-iq.backendEnvFrom" . | nindent 12 }}
          env:
            {{- include "cart-iq.backendDerivedEnv" . | nindent 12 }}
          resources: {{ toYaml .Values.migrate.resources | nindent 12 }}
          securityContext:
            {{- include "cart-iq.containerSecurityContext" . | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            {{- if .Values.vertexServiceAccount.enabled }}
            - name: vertex-sa
              mountPath: {{ .Values.vertexServiceAccount.mountPath }}
              readOnly: true
            {{- end }}
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 256Mi
        {{- if .Values.vertexServiceAccount.enabled }}
        - name: vertex-sa
          secret:
            secretName: {{ required "vertexServiceAccount.existingSecret is required when vertexServiceAccount.enabled=true" .Values.vertexServiceAccount.existingSecret }}
            items:
              - key: gcp-sa.json
                path: gcp-sa.json
        {{- end }}
{{- end }}
