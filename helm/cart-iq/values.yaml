# =============================================================================
# insur-iq Helm chart — default values
# =============================================================================
# This file is the configuration contract. Operators override only the keys
# they need in a downstream values file (see values.example.yaml).
#
# Conventions:
#   - "Auto-derived" values are computed from `global.domain` if left blank.
#   - Image repos auto-derive to ECR when blank: <acct>.dkr.ecr.<region>.amazonaws.com/<name>
#   - Resources are starting points; tune after observing real load.
# =============================================================================

global:
  # Cluster + cloud context. REQUIRED.
  awsAccountId: ""              # e.g. "123456789012"
  awsRegion: ""                 # e.g. "ap-south-1"
  # Public host the app is reachable at. Single host, path-based routing.
  domain: ""                    # e.g. "insuriq.acmecorp.com"
  # Logical environment name; used in labels and SM secret paths.
  env: prod                     # prod | staging | dev
  # Common labels merged into every workload.
  commonLabels: {}
  # Default node selector / tolerations / affinity (overridable per workload).
  nodeSelector: {}
  tolerations: []
  affinity: {}
  # Optional imagePullSecrets (only needed for cross-account ECR pulls).
  imagePullSecrets: []

# -----------------------------------------------------------------------------
# Container images
# -----------------------------------------------------------------------------
image:
  backend:
    # If empty, derives to <awsAccountId>.dkr.ecr.<awsRegion>.amazonaws.com/insur-iq/backend
    repository: ""
    tag: "1.0.0"
    pullPolicy: Always
  web:
    # If empty, derives to <awsAccountId>.dkr.ecr.<awsRegion>.amazonaws.com/insur-iq/web
    repository: ""
    tag: "1.0.0"
    pullPolicy: Always
  auth:
    # Public image; configure ECR pull-through cache to avoid Docker Hub rate limits.
    repository: rhobotsai/auth
    tag: latest
    pullPolicy: Always

# -----------------------------------------------------------------------------
# ServiceAccounts and EKS Pod Identity
# -----------------------------------------------------------------------------
# Three SAs: backend, celery (workers + beat + migrate), eso (handled by ESO chart).
# Web and auth do not need AWS API access — they use the default SA.
serviceAccount:
  create: true
  podIdentityAssociations:
    # Pod Identity association is created out-of-band (Terraform/CLI) on the cluster.
    # These ARNs are used only for documentation; templates rely on SA name + cluster
    # association. Leave blank if Pod Identity is configured by Terraform.
    backendRoleArn: ""
    celeryRoleArn: ""

# -----------------------------------------------------------------------------
# Secrets — primary path: External Secrets Operator (ESO) + AWS Secrets Manager
# -----------------------------------------------------------------------------
externalSecrets:
  enabled: true
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  refreshInterval: 1h
  # AWS Secrets Manager paths. Each must be a JSON-shaped secret.
  remoteRefs:
    backend: insur-iq/prod/backend   # SECRET_KEY, WEBHOOK_SECRET_KEY
    db:      insur-iq/prod/db        # DB_HOST, DB_PORT, DB_USER, DB_PASSWORD, DB_NAME, DB_NAME_AUTH
    redis:   insur-iq/prod/redis     # CELERY_BROKER_URL
    auth:    insur-iq/prod/auth      # BETTER_AUTH_SECRET, OAuth client IDs/secrets
    llm:     insur-iq/prod/llm       # LLM_PROVIDER, *_API_KEY, *_MODEL, LANGFUSE_*, MINERVA_API_URL

# Inline secrets — only used when externalSecrets.enabled=false. Values are
# base64-encoded by the chart. Use ONLY for local kind/dev clusters.
secrets:
  backend:
    SECRET_KEY: ""
    WEBHOOK_SECRET_KEY: ""
  db:
    DB_HOST: ""
    DB_PORT: "5432"
    DB_USER: ""
    DB_PASSWORD: ""
    DB_NAME: insure_iq
    DB_NAME_AUTH: auth
  redis:
    CELERY_BROKER_URL: ""
  auth:
    BETTER_AUTH_SECRET: ""
    GOOGLE_CLIENT_ID: ""
    GOOGLE_CLIENT_SECRET: ""
  llm:
    LLM_PROVIDER: gemini            # gemini | openai | anthropic
    GEMINI_API_KEY: ""
    GEMINI_MODEL: gemini-2.5-flash
    OPENAI_API_KEY: ""
    OPENAI_MODEL: gpt-4o-mini
    ANTHROPIC_API_KEY: ""
    ANTHROPIC_MODEL: claude-sonnet-4-6
    LANGFUSE_PUBLIC_KEY: ""
    LANGFUSE_SECRET_KEY: ""

# -----------------------------------------------------------------------------
# Non-secret config — rendered into a ConfigMap, mounted via envFrom.
# -----------------------------------------------------------------------------
config:
  DEBUG: "False"
  APP_ENV: PROD
  AWS_REGION: ""                  # auto-derives from global.awsRegion
  AWS_STORAGE_BUCKET_NAME: ""     # REQUIRED — S3 bucket for uploads
  AWS_S3_ENDPOINT_URL: ""         # blank for real S3
  AWS_SENDER_EMAIL: ""            # SES verified sender for transactional email; blank disables outbound mail
  CELERY_RESULT_BACKEND: django-db
  CELERY_CACHE_BACKEND: django-cache
  EXCEL_AI_CLASSIFICATION_ENABLED: "true"
  # LLM_PROVIDER and *_MODEL live in the `llm` Secret (insur-iq/<env>/llm),
  # seeded via scripts/seed-secrets.sh — model choice travels with the API key.
  LANGFUSE_HOST: https://cloud.langfuse.com
  MINERVA_API_URL: ""
  POLICY_EXTRACT_CALLBACK_URL: "" # auto-derives to https://<domain>/service-api/policy-extract/callback/
  # Auto-derived from global.domain if blank:
  ALLOWED_HOSTS: ""               # default: <domain>
  CSRF_TRUSTED_ORIGINS: ""        # default: https://<domain>
  HOST_NAME: ""                   # default: https://<domain>
  AWS_S3_PUBLIC_ENDPOINT_URL: ""  # default: blank (real S3); set only when fronting MinIO/S3 with a public proxy

# -----------------------------------------------------------------------------
# Per-workload sections
# -----------------------------------------------------------------------------
backend:
  replicas: 1
  containerPort: 8000
  command:
    - gunicorn
    - config.wsgi:application
    - --bind=0.0.0.0:8000
    - --workers=5
    - --threads=4
    - --worker-class=gthread
    - --timeout=300
    - --graceful-timeout=30
    - --access-logfile=-
    - --error-logfile=-
  resources:
    requests: { cpu: 250m, memory: 512Mi }
    limits:   { cpu: 1000m, memory: 1Gi }
  livenessProbe:
    httpGet:
      path: /service-api/api/health/
      port: 8000
      httpHeaders:
        - name: Host
          value: localhost
    initialDelaySeconds: 30
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 3
  readinessProbe:
    httpGet:
      path: /service-api/api/health/
      port: 8000
      httpHeaders:
        - name: Host
          value: localhost
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  podAnnotations:
    instrumentation.opentelemetry.io/inject-python: "false"
    instrumentation.opentelemetry.io/inject-nodejs: "false"
    instrumentation.opentelemetry.io/inject-java: "false"
    instrumentation.opentelemetry.io/inject-dotnet: "false"
  extraEnv: []

web:
  replicas: 1
  containerPort: 3000
  resources:
    requests: { cpu: 100m, memory: 256Mi }
    limits:   { cpu: 500m, memory: 512Mi }
  # Public-facing URLs the Nuxt SSR uses. Auto-derive from global.domain when blank.
  publicApiBaseUrl: ""        # default: <domain>/service-api          → NUXT_PUBLIC_API_BASE_URL (scheme-less)
  publicAuthBaseUrl: ""       # default: https://<domain>/auth/api/auth → NUXT_PUBLIC_AUTH_BASE_URL
  publicAppBaseUrl: ""        # default: https://<domain>      → NUXT_PUBLIC_APP_BASE_URL
  publicApiScheme: https      # → NUXT_PUBLIC_API_SCHEME
  appBaseUrl: "/"             # → NUXT_APP_BASE_URL (Nuxt subpath; "/" for root deploys)
  enabledSocialProviders: ""  # comma-separated list (e.g. "google,github")
  livenessProbe:
    httpGet: { path: /, port: 3000 }
    initialDelaySeconds: 15
    periodSeconds: 30
    timeoutSeconds: 10
    failureThreshold: 3
  readinessProbe:
    httpGet: { path: /, port: 3000 }
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 10
    failureThreshold: 3
  podAnnotations:
    instrumentation.opentelemetry.io/inject-python: "false"
    instrumentation.opentelemetry.io/inject-nodejs: "false"
    instrumentation.opentelemetry.io/inject-java: "false"
    instrumentation.opentelemetry.io/inject-dotnet: "false"
  extraEnv: []

auth:
  replicas: 1
  containerPort: 10000   # nginx sidecar — ALB target port
  appPort: 10001         # auth app internal port (nginx proxies to this)
  command: ["start"]
  # Auto-derived: postgresql://<user>:<pass>@<DB_HOST>:<port>/<DB_NAME_AUTH>
  databaseString: ""
  basePath: ""                # default: empty — image defaults to /api/auth
  betterAuthUrl: ""           # default: https://<domain>/auth — BETTER_AUTH_URL
  # Auto-derived: http://<release>-backend:8000/service-api/api/auth/webhook/
  webhookEndpoint: ""
  trustedOrigins: ""          # default: https://<domain>
  baseDomain: ""              # default: <domain> — drives Better Auth cookie domain (BASE_DOMAIN)
  requireEmailVerification: "false"
  resources:
    requests: { cpu: 100m, memory: 256Mi }
    limits:   { cpu: 500m, memory: 512Mi }
  livenessProbe:
    httpGet: { path: /auth/api/auth/ok, port: 10000 }
    initialDelaySeconds: 30
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 3
  readinessProbe:
    httpGet: { path: /auth/api/auth/ok, port: 10000 }
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  podAnnotations:
    instrumentation.opentelemetry.io/inject-python: "false"
    instrumentation.opentelemetry.io/inject-nodejs: "false"
    instrumentation.opentelemetry.io/inject-java: "false"
    instrumentation.opentelemetry.io/inject-dotnet: "false"
  extraEnv: []

celery:
  podAnnotations:
    instrumentation.opentelemetry.io/inject-python: "false"
    instrumentation.opentelemetry.io/inject-nodejs: "false"
    instrumentation.opentelemetry.io/inject-java: "false"
    instrumentation.opentelemetry.io/inject-dotnet: "false"
  default:
    replicas: 1
    concurrency: 4
    queues: default
    resources:
      requests: { cpu: 200m, memory: 512Mi }
      limits:   { cpu: 1000m, memory: 1Gi }
  policyExtract:
    replicas: 1
    concurrency: 10
    queues: policy_extract
    resources:
      requests: { cpu: 500m, memory: 1Gi }
      limits:   { cpu: 2000m, memory: 2Gi }
  commissionIntake:
    replicas: 1
    concurrency: 2
    queues: commission_intake
    resources:
      requests: { cpu: 250m, memory: 512Mi }
      limits:   { cpu: 1000m, memory: 1Gi }
  beat:
    enabled: true
    # Singleton — never autoscale, never run >1 replica.
    resources:
      requests: { cpu: 50m, memory: 128Mi }
      limits:   { cpu: 250m, memory: 256Mi }

# -----------------------------------------------------------------------------
# Pre-install/pre-upgrade jobs
# -----------------------------------------------------------------------------
migrate:
  enabled: true
  command:
    - /bin/sh
    - -c
    - "python manage.py migrate --noinput"
  backoffLimit: 2
  activeDeadlineSeconds: 600
  resources:
    requests: { cpu: 200m, memory: 512Mi }
    limits:   { cpu: 1000m, memory: 1Gi }

# Ensures the `auth` database exists on the same RDS instance.
# Better-Auth handles its own schema migrations on boot.
authDbInit:
  enabled: true
  image:
    repository: postgres
    tag: "16-alpine"
  resources:
    requests: { cpu: 50m, memory: 64Mi }
    limits:   { cpu: 200m, memory: 128Mi }

# Init container shared by pre-install Jobs (auth-db-init, migrate). Polls until
# the K8s `db` Secret produced by ESO exists, so Jobs don't race ESO's first
# reconcile. Bump `timeoutSeconds` if your cluster sees slow ESO syncs.
preInstallWait:
  image: alpine/k8s:1.30.0
  timeoutSeconds: 120

# -----------------------------------------------------------------------------
# Ingress — single ALB, path-based routing
# -----------------------------------------------------------------------------
ingress:
  enabled: true
  className: alb
  host: ""                    # falls back to global.domain
  certificateArn: ""          # REQUIRED — ACM cert in same region as cluster
  scheme: internet-facing     # internet-facing | internal
  targetType: ip              # required for Pod Identity / ENI-mode pods
  idleTimeoutSeconds: 300
  # CIDR list permitted to reach /service-api/admin/*. Defaults to deny-all.
  adminCidrAllowlist: []      # e.g. ["10.0.0.0/8", "192.0.2.0/24"]
  extraAnnotations: {}

# -----------------------------------------------------------------------------
# Autoscaling — HPA for backend/web/auth (CPU bound). Celery workers run at
# fixed `replicas`; resize via the `celery.<queue>.replicas` keys above.
# -----------------------------------------------------------------------------
autoscaling:
  backend:        { enabled: true, minReplicas: 1, maxReplicas: 4, targetCPU: 70 }
  web:            { enabled: true, minReplicas: 1, maxReplicas: 2,  targetCPU: 70 }
  auth:           { enabled: true, minReplicas: 1, maxReplicas: 2,  targetCPU: 70 }

# -----------------------------------------------------------------------------
# PodDisruptionBudgets
# -----------------------------------------------------------------------------
podDisruptionBudget:
  backend:          { enabled: true, minAvailable: 1 }
  web:              { enabled: true, minAvailable: 1 }
  auth:             { enabled: true, minAvailable: 1 }
  celeryDefault:    { enabled: true, minAvailable: 1 }
  policyExtract:    { enabled: true, minAvailable: 1 }
  commissionIntake: { enabled: false }

# -----------------------------------------------------------------------------
# NetworkPolicy — default-deny + tight allow list
# -----------------------------------------------------------------------------
networkPolicy:
  enabled: true
  # CIDRs the app must reach (set from Terraform outputs).
  allowedEgress:
    rdsCidrs: []         # e.g. ["10.0.10.0/24", "10.0.11.0/24"] (RDS subnet CIDRs)
    redisCidrs: []       # ElastiCache subnet CIDRs
    # All HTTPS egress (S3, Secrets Manager, LLM APIs, ECR, Langfuse) goes through 0.0.0.0/0:443.

# -----------------------------------------------------------------------------
# Pod security defaults — applied to every workload.
# -----------------------------------------------------------------------------
podSecurity:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop: ["ALL"]
  seccompProfile:
    type: RuntimeDefault

# -----------------------------------------------------------------------------
# Topology spread — applied to backend/web/auth at baseline.
# -----------------------------------------------------------------------------
topologySpread:
  enabled: true
  maxSkew: 1
  topologyKey: topology.kubernetes.io/zone
  whenUnsatisfiable: ScheduleAnyway
