# =============================================================================
# cart-iq Helm chart — default values
# =============================================================================
# This file is the configuration contract. Operators override only the keys
# they need in a downstream values file (see values.example.yaml).
#
# Conventions:
#   - "Auto-derived" values are computed from `global.domain` if left blank.
#   - Image repos auto-derive to ECR when blank: <acct>.dkr.ecr.<region>.amazonaws.com/<name>
#   - Resources are starting points; tune after observing real load.
# =============================================================================

global:
  # Cluster + cloud context. REQUIRED.
  awsAccountId: ""              # e.g. "123456789012"
  awsRegion: ""                 # e.g. "ap-south-1"
  # Public host the app is reachable at. Single host, path-based routing.
  domain: ""                    # e.g. "cartiq.acmecorp.com"
  # Logical environment name; used in labels and SM secret paths.
  env: prod                     # prod | staging | dev
  # Common labels merged into every workload.
  commonLabels: {}
  # Default node selector / tolerations / affinity (overridable per workload).
  nodeSelector: {}
  tolerations: []
  affinity: {}
  # Optional imagePullSecrets (only needed for cross-account ECR pulls).
  imagePullSecrets: []

# -----------------------------------------------------------------------------
# Container images
# -----------------------------------------------------------------------------
image:
  backend:
    # If empty, derives to <awsAccountId>.dkr.ecr.<awsRegion>.amazonaws.com/cart-iq/backend
    repository: ""
    tag: "1.0.0"
    pullPolicy: Always
  web:
    # If empty, derives to <awsAccountId>.dkr.ecr.<awsRegion>.amazonaws.com/cart-iq/web
    repository: ""
    tag: "1.0.0"
    pullPolicy: Always
  scraper:
    # Playwright + Chromium worker image (backend/Dockerfile.scraper).
    # If empty, derives to <awsAccountId>.dkr.ecr.<awsRegion>.amazonaws.com/cart-iq/scraper
    repository: ""
    tag: "1.0.0"
    pullPolicy: Always
  auth:
    # Public image; configure ECR pull-through cache to avoid Docker Hub rate limits.
    repository: rhobotsai/auth
    tag: latest
    pullPolicy: Always

# -----------------------------------------------------------------------------
# ServiceAccounts and EKS Pod Identity
# -----------------------------------------------------------------------------
# Three SAs: backend, celery (workers + beat + migrate), eso (handled by ESO chart).
# Web and auth do not need AWS API access — they use the default SA.
serviceAccount:
  create: true
  podIdentityAssociations:
    # Pod Identity association is created out-of-band (Terraform/CLI) on the cluster.
    # These ARNs are used only for documentation; templates rely on SA name + cluster
    # association. Leave blank if Pod Identity is configured by Terraform.
    backendRoleArn: ""
    celeryRoleArn: ""

# -----------------------------------------------------------------------------
# Secrets — primary path: External Secrets Operator (ESO) + AWS Secrets Manager
# -----------------------------------------------------------------------------
externalSecrets:
  enabled: true
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  refreshInterval: 1h
  # AWS Secrets Manager paths. Each must be a JSON-shaped secret.
  remoteRefs:
    backend: cart-iq/prod/backend   # SECRET_KEY, WEBHOOK_SECRET_KEY
    db:      cart-iq/prod/db        # DB_HOST, DB_PORT, DB_USER, DB_PASSWORD, DB_NAME, DB_NAME_AUTH, PARITY_CHAT_DB_*
    redis:   cart-iq/prod/redis     # CELERY_BROKER_URL
    auth:    cart-iq/prod/auth      # BETTER_AUTH_SECRET, OAuth client IDs/secrets
    llm:     cart-iq/prod/llm       # AI_PROVIDER, *_API_KEY, EMBED_*, PARITY_CHAT_MODEL

# Inline secrets — only used when externalSecrets.enabled=false. Values are
# base64-encoded by the chart. Use ONLY for local kind/dev clusters.
secrets:
  backend:
    SECRET_KEY: ""
    WEBHOOK_SECRET_KEY: ""
  db:
    DB_HOST: ""
    DB_PORT: "5432"
    DB_USER: ""
    DB_PASSWORD: ""
    DB_NAME: cart_iq
    DB_NAME_AUTH: auth
    # Parity-chat read connection. v1 reuses the main user (no read-only role);
    # blank password inherits DB_PASSWORD in the app.
    PARITY_CHAT_DB_USER: cart_iq
    PARITY_CHAT_DB_PASSWORD: ""
  redis:
    CELERY_BROKER_URL: ""
  auth:
    BETTER_AUTH_SECRET: ""
    GOOGLE_CLIENT_ID: ""
    GOOGLE_CLIENT_SECRET: ""
    GITHUB_CLIENT_ID: ""
    GITHUB_CLIENT_SECRET: ""
    MICROSOFT_CLIENT_ID: ""
    MICROSOFT_CLIENT_SECRET: ""
  llm:
    AI_PROVIDER: google             # google | openai | anthropic | groq | together | ollama
    GOOGLE_API_KEY: ""
    EMBED_GOOGLE_API_KEY: ""        # blank → inherits GOOGLE_API_KEY
    OPENAI_API_KEY: ""
    ANTHROPIC_API_KEY: ""
    GROQ_API_KEY: ""
    TOGETHER_API_KEY: ""
    OLLAMA_API_BASE: ""
    PARITY_CHAT_MODEL: anthropic/claude-opus-4-7

# -----------------------------------------------------------------------------
# Non-secret config — rendered into a ConfigMap, mounted via envFrom.
# -----------------------------------------------------------------------------
config:
  DEBUG: "False"
  APP_ENV: PROD
  AWS_REGION: ""                  # auto-derives from global.awsRegion
  AWS_STORAGE_BUCKET_NAME: ""     # REQUIRED — S3 bucket for uploads
  AWS_S3_ENDPOINT_URL: ""         # blank for real S3
  AWS_S3_PUBLIC_ENDPOINT_URL: ""  # default: blank (real S3); set only when fronting MinIO/S3 with a public proxy
  # NOTE: cart-iq's settings.py currently declares AWS_ACCESS_KEY_ID /
  # AWS_SECRET_ACCESS_KEY as REQUIRED env vars (no default). This stack uses
  # EKS Pod Identity (no static keys), so those vars are intentionally NOT set
  # here — setting them (even empty) would short-circuit boto3's credential
  # chain and break Pod Identity. The app must default them blank in
  # config/settings.py (env defaults) for backend/celery to boot. See the
  # deployment guide's decision log.
  CELERY_RESULT_BACKEND: django-db
  CELERY_CACHE_BACKEND: django-cache
  # AI provider/model/keys + embedding config live in the `llm` Secret
  # (cart-iq/<env>/llm), seeded via scripts/seed-secrets.sh.
  EMBED_MODEL: gemini-embedding-2
  EMBED_DIMENSIONS: "1536"
  GEMINI_USE_VERTEX_AI: "False"
  EMBED_USE_VERTEX_AI: ""         # blank → inherits GEMINI_USE_VERTEX_AI
  # Regional Vertex AI for embeddings. The EMBED_MODEL default (gemini-embedding-2)
  # is only served on the Vertex regional endpoint — set GOOGLE_CLOUD_PROJECT and
  # supply a service-account key via the `vertexServiceAccount` block below
  # (mounted at GOOGLE_APPLICATION_CREDENTIALS). Leave the project blank for the
  # api-key path (then set EMBED_MODEL: gemini-embedding-001).
  GOOGLE_CLOUD_PROJECT: ""        # GCP project for ADC/Vertex; blank → api-key path
  GOOGLE_CLOUD_LOCATION: "us"
  # GOOGLE_APPLICATION_CREDENTIALS is NOT set here — it is derived in the ConfigMap
  # from vertexServiceAccount.mountPath (only when vertexServiceAccount.enabled), so
  # the path always tracks the actual mount. Change the mount via that block, not here.
  PARITY_CHAT_CACHE_ENABLED: "False"
  ANTHROPIC_RATIONALES_ENABLED: "False"
  # Scraper tunables (Playwright/Flipkart). Defaults match the app; override
  # only when load-testing or rate-limit tuning. Unset keys fall back to the
  # app's built-in defaults in config/settings.py.
  SCRAPER_DEFAULT_PINCODE: "110001"
  SCRAPER_MAX_CONCURRENCY: "3"    # also feeds celery scraper worker -c
  SCRAPER_COLOR_CONCURRENCY: "3"
  SCRAPER_BROWSER_TIMEOUT_MS: "30000"
  SCRAPER_NAVIGATE_TIMEOUT_MS: "20000"
  SCRAPER_DEBUG_ARTIFACTS_ENABLED: "true"
  SCRAPER_RETRY_MAX: "2"
  SCRAPER_FLIPKART_RATE_PER_MIN: "30"
  SCRAPER_DEFAULT_RATE_PER_MIN: "60"
  SCRAPER_RATE_LIMIT_ENABLED: "True"
  SCRAPER_JITTER_MS_MIN: "200"
  SCRAPER_JITTER_MS_MAX: "800"
  SCRAPER_LISTING_MAX_PAGES: "200"
  SCRAPER_LISTING_PARTITION: "True"
  SCRAPER_PRICE_SIZE_VARIANTS: "true"   # true clicks every size/colour (slow); false = labels only
  SCRAPER_FORCE_AKAMAI_EDGE: "false"    # true on hosts blackholing Flipkart-origin (some AWS Mumbai subnets)
  SCRAPER_AKAMAI_HOSTS: "www.flipkart.com.edgekey.net,e348826.dscb.akamaiedge.net"
  SCRAPER_AKAMAI_FALLBACK_IP: ""
  SCRAPER_AKAMAI_PROBE_TIMEOUT_S: "3.0"
  SCRAPER_AKAMAI_CACHE_TTL_S: "300"
  # Auto-derived from global.domain if blank:
  ALLOWED_HOSTS: ""               # default: <domain>
  CSRF_TRUSTED_ORIGINS: ""        # default: https://<domain>
  HOST_NAME: ""                   # default: https://<domain>

# -----------------------------------------------------------------------------
# Vertex AI service-account key — optional. Required only when embeddings use
# regional Vertex (config.GOOGLE_CLOUD_PROJECT set + gemini-embedding-2). The key
# is mounted read-only into backend/celery/beat/migrate pods at
# <mountPath>/gcp-sa.json, which config.GOOGLE_APPLICATION_CREDENTIALS points at.
# Provide the key as a K8s Secret holding the data key `gcp-sa.json` — create it
# directly (kubectl create secret generic ... --from-file=gcp-sa.json=...) or
# project it via ESO from Secrets Manager. Disabled by default; key-only
# deployments are unaffected.
# -----------------------------------------------------------------------------
vertexServiceAccount:
  enabled: false
  existingSecret: ""              # name of a Secret with data key `gcp-sa.json`
  mountPath: /secrets

# -----------------------------------------------------------------------------
# Per-workload sections
# -----------------------------------------------------------------------------
backend:
  replicas: 1
  containerPort: 8000
  command:
    - gunicorn
    - config.wsgi:application
    - --bind=0.0.0.0:8000
    - --workers=5
    - --threads=4
    - --worker-class=gthread
    - --timeout=300
    - --graceful-timeout=30
    - --access-logfile=-
    - --error-logfile=-
  resources:
    requests: { cpu: 250m, memory: 512Mi }
    limits:   { cpu: 1000m, memory: 1Gi }
  livenessProbe:
    httpGet:
      path: /service-api/api/health/
      port: 8000
      httpHeaders:
        - name: Host
          value: localhost
    initialDelaySeconds: 30
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 3
  readinessProbe:
    httpGet:
      path: /service-api/api/health/
      port: 8000
      httpHeaders:
        - name: Host
          value: localhost
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  podAnnotations:
    instrumentation.opentelemetry.io/inject-python: "false"
    instrumentation.opentelemetry.io/inject-nodejs: "false"
    instrumentation.opentelemetry.io/inject-java: "false"
    instrumentation.opentelemetry.io/inject-dotnet: "false"
  extraEnv: []

web:
  replicas: 1
  containerPort: 3000
  resources:
    requests: { cpu: 100m, memory: 256Mi }
    limits:   { cpu: 500m, memory: 512Mi }
  # Public-facing URLs the Nuxt SSR uses. Auto-derive from global.domain when blank.
  publicApiBaseUrl: ""        # default: <domain>/service-api          → NUXT_PUBLIC_API_BASE_URL (scheme-less)
  publicAuthBaseUrl: ""       # default: https://<domain>/auth/api/auth → NUXT_PUBLIC_AUTH_BASE_URL
  publicAppBaseUrl: ""        # default: https://<domain>      → NUXT_PUBLIC_APP_BASE_URL
  publicApiScheme: https      # → NUXT_PUBLIC_API_SCHEME
  appBaseUrl: "/"             # → NUXT_APP_BASE_URL (Nuxt subpath; "/" for root deploys)
  enabledSocialProviders: ""  # comma-separated list (e.g. "google,github")
  scraperDefaultPincode: "110001"  # → NUXT_PUBLIC_SCRAPER_DEFAULT_PINCODE
  livenessProbe:
    httpGet: { path: /, port: 3000 }
    initialDelaySeconds: 15
    periodSeconds: 30
    timeoutSeconds: 10
    failureThreshold: 3
  readinessProbe:
    httpGet: { path: /, port: 3000 }
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 10
    failureThreshold: 3
  podAnnotations:
    instrumentation.opentelemetry.io/inject-python: "false"
    instrumentation.opentelemetry.io/inject-nodejs: "false"
    instrumentation.opentelemetry.io/inject-java: "false"
    instrumentation.opentelemetry.io/inject-dotnet: "false"
  extraEnv: []

auth:
  replicas: 1
  containerPort: 10000   # nginx sidecar — ALB target port
  appPort: 10001         # auth app internal port (nginx proxies to this)
  command: ["start"]
  # Auto-derived: postgresql://<user>:<pass>@<DB_HOST>:<port>/<DB_NAME_AUTH>
  databaseString: ""
  basePath: ""                # default: empty — image defaults to /api/auth
  betterAuthUrl: ""           # default: https://<domain>/auth — BETTER_AUTH_URL
  # Auto-derived: http://<release>-backend:8000/service-api/api/auth/webhook/
  webhookEndpoint: ""
  trustedOrigins: ""          # default: https://<domain>
  baseDomain: ""              # default: <domain> — drives Better Auth cookie domain (BASE_DOMAIN)
  requireEmailVerification: "false"
  resources:
    requests: { cpu: 100m, memory: 256Mi }
    limits:   { cpu: 500m, memory: 512Mi }
  livenessProbe:
    httpGet: { path: /auth/api/auth/ok, port: 10000 }
    initialDelaySeconds: 30
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 3
  readinessProbe:
    httpGet: { path: /auth/api/auth/ok, port: 10000 }
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  podAnnotations:
    instrumentation.opentelemetry.io/inject-python: "false"
    instrumentation.opentelemetry.io/inject-nodejs: "false"
    instrumentation.opentelemetry.io/inject-java: "false"
    instrumentation.opentelemetry.io/inject-dotnet: "false"
  extraEnv: []

celery:
  podAnnotations:
    instrumentation.opentelemetry.io/inject-python: "false"
    instrumentation.opentelemetry.io/inject-nodejs: "false"
    instrumentation.opentelemetry.io/inject-java: "false"
    instrumentation.opentelemetry.io/inject-dotnet: "false"
  # General-purpose worker — consumes the app's default queue ("celery") for
  # parity/catalogue tasks. Default (prefork) pool, backend image.
  default:
    replicas: 1
    concurrency: 4
    queues: celery
    resources:
      requests: { cpu: 200m, memory: 512Mi }
      limits:   { cpu: 1000m, memory: 1Gi }
  # Browser scraper worker — Playwright/Chromium image, prefork pool (a hung
  # browser task must be killable by --time-limit), recycles processes to cap
  # Chromium memory, prefetch=1 to avoid orphaned jobs on restart. Consumes the
  # dedicated listing queue alongside the product queue so listings aren't
  # starved behind product children.
  scraper:
    image: scraper
    pool: prefork
    devShm: true                  # Chromium /dev/shm
    devShmSizeLimit: 1Gi
    tmpSizeLimit: 4Gi
    replicas: 1
    concurrency: 3                # keep in sync with config.SCRAPER_MAX_CONCURRENCY
    queues: scraper_listing,scraper
    # Chromium/Playwright needs a writable HOME + cache/config dirs. The image
    # defaults HOME=/root, which is not writable under readOnlyRootFilesystem +
    # runAsUser 1000. Point them all at the writable /tmp emptyDir so the browser
    # can create its singleton/profile/cache.
    extraEnv:
      - { name: HOME, value: /tmp }
      - { name: XDG_CACHE_HOME, value: /tmp/.cache }
      - { name: XDG_CONFIG_HOME, value: /tmp/.config }
      - { name: TMPDIR, value: /tmp }
    extraArgs:
      - --max-tasks-per-child=20
      - --prefetch-multiplier=1
      - --time-limit=700
      - --soft-time-limit=600
    resources:
      requests: { cpu: 500m, memory: 1Gi }
      limits:   { cpu: 2000m, memory: 3Gi }
  beat:
    enabled: true
    # Singleton — never autoscale, never run >1 replica.
    resources:
      requests: { cpu: 50m, memory: 128Mi }
      limits:   { cpu: 250m, memory: 256Mi }

# -----------------------------------------------------------------------------
# Pre-install/pre-upgrade jobs
# -----------------------------------------------------------------------------
migrate:
  enabled: true
  command:
    - /bin/sh
    - -c
    - "python manage.py migrate --noinput"
  backoffLimit: 2
  activeDeadlineSeconds: 600
  resources:
    requests: { cpu: 200m, memory: 512Mi }
    limits:   { cpu: 1000m, memory: 1Gi }

# Ensures the `auth` database exists on the same RDS instance.
# Better-Auth handles its own schema migrations on boot.
authDbInit:
  enabled: true
  image:
    repository: postgres
    tag: "16-alpine"
  resources:
    requests: { cpu: 50m, memory: 64Mi }
    limits:   { cpu: 200m, memory: 128Mi }

# Init container shared by pre-install Jobs (auth-db-init, migrate). Polls until
# the K8s `db` Secret produced by ESO exists, so Jobs don't race ESO's first
# reconcile. Bump `timeoutSeconds` if your cluster sees slow ESO syncs.
preInstallWait:
  image: alpine/k8s:1.30.0
  timeoutSeconds: 120

# -----------------------------------------------------------------------------
# Ingress — single ALB, path-based routing
# -----------------------------------------------------------------------------
ingress:
  enabled: true
  className: alb
  host: ""                    # falls back to global.domain
  certificateArn: ""          # REQUIRED — ACM cert in same region as cluster
  scheme: internet-facing     # internet-facing | internal
  targetType: ip              # required for Pod Identity / ENI-mode pods
  idleTimeoutSeconds: 300
  # CIDR list permitted to reach /service-api/admin/*. Defaults to deny-all.
  adminCidrAllowlist: []      # e.g. ["10.0.0.0/8", "192.0.2.0/24"]
  extraAnnotations: {}

# -----------------------------------------------------------------------------
# Autoscaling — HPA for backend/web/auth (CPU bound). Celery workers run at
# fixed `replicas`; resize via the `celery.<queue>.replicas` keys above.
# -----------------------------------------------------------------------------
autoscaling:
  backend:        { enabled: true, minReplicas: 1, maxReplicas: 4, targetCPU: 70 }
  web:            { enabled: true, minReplicas: 1, maxReplicas: 2,  targetCPU: 70 }
  auth:           { enabled: true, minReplicas: 1, maxReplicas: 2,  targetCPU: 70 }

# -----------------------------------------------------------------------------
# PodDisruptionBudgets
# -----------------------------------------------------------------------------
podDisruptionBudget:
  backend:          { enabled: true, minAvailable: 1 }
  web:              { enabled: true, minAvailable: 1 }
  auth:             { enabled: true, minAvailable: 1 }
  celeryDefault:    { enabled: true, minAvailable: 1 }
  scraper:          { enabled: true, minAvailable: 1 }

# -----------------------------------------------------------------------------
# NetworkPolicy — default-deny + tight allow list
# -----------------------------------------------------------------------------
networkPolicy:
  enabled: true
  # CIDRs the app must reach (set from Terraform outputs).
  allowedEgress:
    rdsCidrs: []         # e.g. ["10.0.10.0/24", "10.0.11.0/24"] (RDS subnet CIDRs)
    redisCidrs: []       # ElastiCache subnet CIDRs
    # All HTTPS egress (S3, Secrets Manager, AI provider APIs, ECR, scraper targets) goes through 0.0.0.0/0:443.

# -----------------------------------------------------------------------------
# Pod security defaults — applied to every workload.
# -----------------------------------------------------------------------------
podSecurity:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop: ["ALL"]
  seccompProfile:
    type: RuntimeDefault

# -----------------------------------------------------------------------------
# Topology spread — applied to backend/web/auth at baseline.
# -----------------------------------------------------------------------------
topologySpread:
  enabled: true
  maxSkew: 1
  topologyKey: topology.kubernetes.io/zone
  whenUnsatisfiable: ScheduleAnyway
