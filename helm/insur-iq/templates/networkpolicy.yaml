{{- if .Values.networkPolicy.enabled -}}
# Default-deny: nothing in or out unless explicitly allowed below.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "insur-iq.fullname" . }}-default-deny
  labels:
    {{- include "insur-iq.labels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes: [Ingress, Egress]
---
# Allow ingress to backend/web/auth from any source on the app ports.
# (ALB targets pod IPs directly via target-type=ip; ALB SG-restricted at the ALB.)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "insur-iq.fullname" . }}-allow-ingress-app
  labels:
    {{- include "insur-iq.labels" . | nindent 4 }}
spec:
  podSelector:
    matchExpressions:
      - key: app.kubernetes.io/component
        operator: In
        values: [backend, web, auth]
  policyTypes: [Ingress]
  ingress:
    - {}
---
# Allow egress from all app pods to: kube-dns, RDS, Redis, HTTPS (S3/SM/LLM/ECR).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "insur-iq.fullname" . }}-allow-egress
  labels:
    {{- include "insur-iq.labels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes: [Egress]
  egress:
    # DNS
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - { port: 53, protocol: UDP }
        - { port: 53, protocol: TCP }
    # RDS Proxy / RDS
    {{- if .Values.networkPolicy.allowedEgress.rdsCidrs }}
    - to:
        {{- range .Values.networkPolicy.allowedEgress.rdsCidrs }}
        - ipBlock: { cidr: {{ . | quote }} }
        {{- end }}
      ports:
        - { port: 5432, protocol: TCP }
    {{- end }}
    # ElastiCache Redis
    {{- if .Values.networkPolicy.allowedEgress.redisCidrs }}
    - to:
        {{- range .Values.networkPolicy.allowedEgress.redisCidrs }}
        - ipBlock: { cidr: {{ . | quote }} }
        {{- end }}
      ports:
        - { port: 6379, protocol: TCP }
    {{- end }}
    # HTTPS (S3, Secrets Manager, ECR, LLM APIs, Langfuse)
    - to:
        - ipBlock: { cidr: 0.0.0.0/0 }
      ports:
        - { port: 443, protocol: TCP }
    # Cluster-internal pod-to-pod (backend ↔ auth webhook on :8000/:10000)
    - to:
        - podSelector:
            matchLabels:
              {{- include "insur-iq.selectorLabels" . | nindent 14 }}
{{- end }}
