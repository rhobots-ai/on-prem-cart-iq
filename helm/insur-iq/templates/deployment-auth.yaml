apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "insur-iq.fullname" . }}-auth
  labels:
    {{- include "insur-iq.labels" . | nindent 4 }}
    app.kubernetes.io/component: auth
spec:
  {{- if not .Values.autoscaling.auth.enabled }}
  replicas: {{ .Values.auth.replicas }}
  {{- end }}
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      {{- include "insur-iq.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: auth
  template:
    metadata:
      labels:
        {{- include "insur-iq.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: auth
      annotations:
        {{- toYaml .Values.auth.podAnnotations | nindent 8 }}
    spec:
      securityContext:
        {{- include "insur-iq.podSecurityContext" . | nindent 8 }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets: {{ toYaml . | nindent 8 }}
      {{- end }}
      topologySpreadConstraints:
        {{- include "insur-iq.topologySpread" . | nindent 8 }}
      containers:
        - name: auth
          image: {{ include "insur-iq.image.auth" . }}
          imagePullPolicy: {{ .Values.image.auth.pullPolicy }}
          args: {{ toJson .Values.auth.command }}
          ports:
            - name: app
              containerPort: {{ .Values.auth.appPort }}
              protocol: TCP
          envFrom:
            {{- include "insur-iq.authEnvFrom" . | nindent 12 }}
          env:
            {{- include "insur-iq.authDerivedEnv" . | nindent 12 }}
            {{- with .Values.auth.extraEnv }}{{ toYaml . | nindent 12 }}{{- end }}
          resources: {{ toYaml .Values.auth.resources | nindent 12 }}
          securityContext:
            {{- include "insur-iq.containerSecurityContext" . | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
        - name: nginx
          image: nginx:1.27-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: {{ .Values.auth.containerPort }}
              protocol: TCP
          livenessProbe: {{ toYaml .Values.auth.livenessProbe | nindent 12 }}
          readinessProbe: {{ toYaml .Values.auth.readinessProbe | nindent 12 }}
          resources:
            requests: { cpu: 20m, memory: 32Mi }
            limits:   { cpu: 100m, memory: 64Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 101
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: nginx-conf
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
              readOnly: true
            - name: nginx-tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 256Mi
        - name: nginx-conf
          configMap:
            name: {{ include "insur-iq.fullname" . }}-auth-nginx
        - name: nginx-tmp
          emptyDir:
            sizeLimit: 64Mi
