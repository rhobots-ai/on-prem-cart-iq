{{- if .Values.serviceAccount.create -}}
# Backend SA — used by backend pods.
# EKS Pod Identity association (cluster → SA → IAM role) is created out-of-band
# via Terraform/CLI (see infra/terraform/).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "insur-iq.sa.backend" . }}
  labels:
    {{- include "insur-iq.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "0"
    helm.sh/hook-delete-policy: before-hook-creation
---
# Celery SA — shared by all celery workers, beat, migrate, auth-db-init Jobs.
# Installed as a pre-install hook (weight 0) so it exists before the
# auth-db-init (weight 5) and migrate (weight 10) Jobs that run as it.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "insur-iq.sa.celery" . }}
  labels:
    {{- include "insur-iq.labels" . | nindent 4 }}
    app.kubernetes.io/component: celery
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "0"
    helm.sh/hook-delete-policy: before-hook-creation
{{- end }}
