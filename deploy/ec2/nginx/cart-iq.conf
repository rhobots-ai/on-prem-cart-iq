# Reverse proxy on the app box, adapted from the prod nginx template for use
# behind an ALB: the ALB terminates TLS, so nginx listens on :80 only (no SSL,
# no certs here). Trailing-slash proxy_pass STRIPS the location prefix, so the
# backend/auth containers receive bare paths (/api/..., /api/auth/...) — the same
# behaviour as the standalone prod compose.
#
#   /auth/             → auth:10000   (strips /auth/  → /api/auth/...)
#   /service-api/static/ → /app/static (served by nginx from the shared volume)
#   /service-api/      → backend:8000 (strips /service-api/ → /api/...)
#   /                  → web:3000
server {
    listen 80;
    server_name _;

    # Large catalogue/upload payloads; matches the ALB idle_timeout=300s.
    client_max_body_size 500M;

    # X-Forwarded-Proto is https — the ALB terminated TLS before us.
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;

    # ALB target-group health check — answered directly, no upstream dependency.
    location = /healthz {
        access_log off;
        return 200 "ok\n";
    }

    # --------------------
    # AUTH SERVICE
    # --------------------
    location /auth/ {
        proxy_pass http://auth:10000/;
    }

    # --------------------
    # API STATIC FILES (Django collectstatic, shared via operator-static volume)
    # --------------------
    location /service-api/static/ {
        alias /app/static/;
        access_log off;
        expires 30d;
    }

    # --------------------
    # BACKEND API
    # --------------------
    location /service-api/ {
        proxy_pass http://backend:8000/;
        proxy_connect_timeout 300s;
        proxy_send_timeout    300s;
        proxy_read_timeout    300s;
    }

    # --------------------
    # WEB UI
    # --------------------
    location / {
        proxy_pass http://web:3000/;
    }
}
